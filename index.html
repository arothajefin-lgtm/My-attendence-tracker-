<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apollo Tyres Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; }
        .shift-a { background-color: #dcfce7 !important; color: #15803d !important; border: 2.5px solid #15803d !important; }
        .shift-b { background-color: #dbeafe !important; color: #1d4ed8 !important; border: 2.5px solid #1d4ed8 !important; }
        .shift-c { background-color: #fef9c3 !important; color: #a16207 !important; border: 2.5px solid #a16207 !important; }
        .shift-off { background-color: #f3f4f6 !important; color: #4b5563 !important; border: 2.5px solid #4b5563 !important; }
        .shift-leave { background-color: #fee2e2 !important; color: #b91c1c !important; border: 2.5px solid #b91c1c !important; }
        .shift-holiday { background-color: #f5f3ff !important; color: #6d28d9 !important; border: 2.5px solid #6d28d9 !important; }
        .calendar-day { aspect-ratio: 1 / 1.2; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; border: 1px solid #d1d5db; cursor: pointer; border-radius: 12px; margin: 2px; position: relative; }
        .ot-label { position: absolute; top: 2px; right: 4px; color: #ea580c; font-size: 8px; font-weight: 900; }
        .shift-tag { font-size: 9px; font-weight: 900; margin-top: 2px; text-transform: uppercase; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 50; backdrop-filter: blur(4px); }
        .modal.active { display: flex; }
    </style>
</head>
<body class="pb-10">

    <header class="bg-white p-4 shadow-sm flex justify-between items-center sticky top-0 z-40">
        <div class="flex items-center gap-2">
            <div class="w-9 h-9 bg-rose-600 rounded-lg text-white flex items-center justify-center font-black text-xl shadow-lg">A</div>
            <div>
                <h1 class="font-extrabold text-gray-800 leading-none">Apollo Tyres</h1>
                <p id="userDisplay" class="text-[10px] text-gray-400 font-bold uppercase tracking-tighter">Attendance Manager</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="googleLogin()" id="loginBtn" class="p-2 bg-blue-600 text-white rounded-xl text-xs font-bold px-4">Login</button>
            <button onclick="openSettings()" class="p-2 bg-gray-100 rounded-xl">⚙️</button>
        </div>
    </header>

    <main class="max-w-md mx-auto px-3 mt-4">
        <div class="flex justify-between items-center mb-4 bg-white p-2 rounded-2xl shadow-sm border border-gray-100">
            <button onclick="changeMonth(-1)" class="w-10 h-10 flex items-center justify-center bg-gray-50 rounded-xl text-rose-600 font-bold">←</button>
            <h2 id="monthDisplay" class="font-extrabold text-gray-700"></h2>
            <button onclick="changeMonth(1)" class="w-10 h-10 flex items-center justify-center bg-gray-50 rounded-xl text-rose-600 font-bold">→</button>
        </div>
        <div id="syncStatus" class="hidden text-center text-[10px] font-bold text-green-600 mb-2">● Auto-sync Active</div>
        <div class="bg-white rounded-3xl shadow-sm p-3 mb-6 border border-gray-100">
            <div id="calendarGrid" class="grid grid-cols-7 text-center"></div>
        </div>

        <div class="bg-white p-5 rounded-3xl shadow-sm border-l-8 border-rose-500 mb-6">
            <div class="grid grid-cols-5 gap-2 text-center">
                <div class="p-2 bg-blue-50 rounded-lg"><p class="text-[8px] font-bold">DUTY</p><p id="statDuty" class="text-lg font-black">0</p></div>
                <div class="p-2 bg-orange-50 rounded-lg"><p class="text-[8px] font-bold">OT</p><p id="statOt" class="text-lg font-black">0</p></div>
                <div class="p-2 bg-gray-50 rounded-lg"><p class="text-[8px] font-bold">OFF</p><p id="statOff" class="text-lg font-black">0</p></div>
                <div class="p-2 bg-purple-50 rounded-lg"><p class="text-[8px] font-bold">HOLI</p><p id="statHoliday" class="text-lg font-black">0</p></div>
                <div class="p-2 bg-red-50 rounded-lg"><p class="text-[8px] font-bold">LEAVE</p><p id="statLeave" class="text-lg font-black">0</p></div>
            </div>
        </div>
    </main>

    <div id="dayModal" class="modal px-4">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-6 shadow-2xl">
            <h3 id="selectedDateTitle" class="font-black text-xl mb-4 text-center text-gray-800"></h3>
            <div class="grid grid-cols-3 gap-2 mb-4">
                <button onclick="setShift('A', this)" class="shift-btn p-3 rounded-xl border-2 border-gray-100 bg-gray-50 text-xs font-bold">A Shift</button>
                <button onclick="setShift('B', this)" class="shift-btn p-3 rounded-xl border-2 border-gray-100 bg-gray-50 text-xs font-bold">B Shift</button>
                <button onclick="setShift('C', this)" class="shift-btn p-3 rounded-xl border-2 border-gray-100 bg-gray-50 text-xs font-bold">C Shift</button>
                <button onclick="setShift('OFF', this)" class="shift-btn p-3 rounded-xl border-2 border-gray-100 bg-gray-50 text-xs font-bold">OFF</button>
                <button onclick="setShift('LEAVE', this)" class="shift-btn p-3 rounded-xl border-2 border-gray-100 bg-gray-50 text-xs font-bold text-red-600">LEAVE</button>
                <button onclick="setShift('HOLIDAY', this)" class="shift-btn p-3 rounded-xl border-2 border-gray-100 bg-gray-50 text-xs font-bold text-purple-600">HOLIDAY</button>
            </div>
            <label class="flex items-center gap-2 p-3 bg-orange-50 rounded-xl border border-orange-200 mb-4 cursor-pointer">
                <input type="checkbox" id="otCheck" class="w-5 h-5 accent-orange-600">
                <span class="text-sm font-bold text-orange-900">Over Time (OT)</span>
            </label>
            <textarea id="dayNote" class="w-full p-3 bg-gray-50 border-2 border-gray-100 rounded-xl text-sm mb-4" placeholder="കുറിപ്പുകൾ..."></textarea>
            <div class="flex gap-2">
                <button onclick="deleteEntry()" class="w-1/4 py-3 text-gray-400 font-bold">Clear</button>
                <button onclick="saveAttendance()" class="w-3/4 py-3 bg-rose-600 text-white rounded-xl font-black">Save</button>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="modal px-4">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-7 shadow-2xl max-h-[90vh] overflow-y-auto">
            <h3 class="font-black text-xl mb-6 text-gray-800">⚙️ Settings</h3>
            
            <div class="flex flex-col gap-3 mb-6">
                <button onclick="backupToTelegram()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black">📤 Backup to Telegram</button>
                
                <div class="p-4 bg-green-50 rounded-2xl border border-green-200 text-center">
                    <p class="text-[10px] font-bold text-green-700 mb-2 uppercase">Restore Data</p>
                    <input type="file" id="restoreFile" class="hidden" accept=".json" onchange="restoreFromFile(event)">
                    <button onclick="document.getElementById('restoreFile').click()" class="w-full py-3 bg-white border-2 border-green-300 text-green-700 rounded-xl font-black text-xs">📥 Select Backup File</button>
                </div>

                <button onclick="logout()" id="logoutBtn" class="hidden w-full py-3 bg-red-50 text-red-600 rounded-xl font-bold text-sm">Logout</button>
            </div>

            <div class="p-4 bg-gray-50 rounded-2xl border border-gray-100">
                <h4 class="font-bold text-sm text-gray-700 mb-3 underline">Range Report</h4>
                <div class="flex gap-2 mb-3">
                    <input type="month" id="rangeFrom" class="w-1/2 p-2 text-xs border rounded-lg">
                    <input type="month" id="rangeTo" class="w-1/2 p-2 text-xs border rounded-lg">
                </div>
                <button onclick="calculateRange()" class="w-full py-2 bg-slate-800 text-white rounded-lg font-black text-xs">കാണുക</button>
                <div id="rangeResults" class="hidden mt-3 grid grid-cols-2 gap-2 text-[10px] font-bold">
                    <p>Duty: <span id="rDuty">0</span></p><p>OT: <span id="rOt">0</span></p>
                    <p>Off: <span id="rOff">0</span></p><p>Holi: <span id="rHoliday">0</span></p>
                    <p>Leave: <span id="rLeave">0</span></p>
                </div>
            </div>
            <button onclick="closeModal('settingsModal')" class="w-full py-3 mt-6 bg-gray-100 text-gray-500 rounded-xl font-black">Close</button>
        </div>
    </div>

    <script>
        // --- CONFIGURATIONS ---
        const botToken = '7909722913:AAEQhIp7o5WhVSZUjgLYA8qAO25FPmj6s0o';
        const chatId = '329918149';
        const firebaseConfig = {
            apiKey: "AIzaSyAwa0CyzqCMdabu7okfbRxXbvvb8-r9b-c",
            authDomain: "my-tool-box-cff46.firebaseapp.com",
            databaseURL: "https://my-tool-box-cff46-default-rtdb.firebaseio.com",
            projectId: "my-tool-box-cff46",
            storageBucket: "my-tool-box-cff46.firebasestorage.app",
            messagingSenderId: "810718456028",
            appId: "1:810718456028:web:c573c7f9d7d1b8b8ea6c19",
            measurementId: "G-86BSBL1KHM"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let currentUser = null;
        let attendanceData = {};
        let currentDate = new Date();
        let selectedKey = null, activeShift = null;
        const monthsML = ["ജനുവരി", "ഫെബ്രുവരി", "മാർച്ച്", "ഏപ്രിൽ", "മേയ്", "ജൂൺ", "ജൂലൈ", "ഓഗസ്റ്റ്", "സെപ്റ്റംബർ", "ഒക്ടോബർ", "നവംബർ", "ഡിസംബർ"];

        // --- AUTH LOGIC ---
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('userDisplay').innerText = user.displayName;
                document.getElementById('loginBtn').classList.add('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');
                document.getElementById('syncStatus').classList.remove('hidden');
                // Real-time Sync from Database
                db.ref('users/' + user.uid).on('value', snap => {
                    attendanceData = snap.val() || {};
                    renderCalendar();
                });
            } else {
                currentUser = null;
                attendanceData = {};
                document.getElementById('userDisplay').innerText = "Please Login";
                document.getElementById('loginBtn').classList.remove('hidden');
                document.getElementById('logoutBtn').classList.add('hidden');
                document.getElementById('syncStatus').classList.add('hidden');
                renderCalendar();
            }
        });

        function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(err => alert("Login Failed: " + err.message));
        }

        function logout() {
            if(confirm("Logout ചെയ്യണോ?")) auth.signOut().then(() => location.reload());
        }

        // --- CALENDAR LOGIC ---
        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const y = currentDate.getFullYear(), m = currentDate.getMonth();
            document.getElementById('monthDisplay').innerText = `${monthsML[m]} ${y}`;
            grid.innerHTML = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => `<div class="text-[10px] font-black text-gray-400 py-2 uppercase">${d}</div>`).join('');
            
            const first = new Date(y, m, 1).getDay();
            const days = new Date(y, m + 1, 0).getDate();
            
            for (let i = 0; i < first; i++) grid.appendChild(document.createElement('div'));
            
            for (let d = 1; d <= days; d++) {
                const key = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const data = attendanceData[key];
                const el = document.createElement('div');
                el.className = `calendar-day ${data ? 'shift-' + data.shift.toLowerCase() : ''}`;
                
                let label = data ? (data.shift === 'LEAVE' ? 'L' : data.shift === 'HOLIDAY' ? 'HD' : data.shift) : '';
                el.innerHTML = `<span class="text-sm font-black">${d}</span> 
                                <span class="shift-tag">${label}</span>
                                ${data?.ot ? '<span class="ot-label">OT</span>' : ''}`;
                el.onclick = () => {
                    if(!currentUser) return googleLogin();
                    openDay(key, d);
                };
                grid.appendChild(el);
            }
            updateStats();
        }

        function openDay(key, d) {
            selectedKey = key; 
            const data = attendanceData[key] || {};
            document.getElementById('selectedDateTitle').innerText = `${d} ${monthsML[currentDate.getMonth()]}`;
            document.getElementById('otCheck').checked = !!data.ot;
            document.getElementById('dayNote').value = data.note || '';
            activeShift = data.shift || null;
            
            document.querySelectorAll('.shift-btn').forEach(b => {
                b.style.borderColor = b.innerText.split(' ')[0] === activeShift ? '#e11d48' : '#f3f4f6';
            });
            document.getElementById('dayModal').classList.add('active');
        }

        function setShift(s, btn) {
            activeShift = s;
            document.querySelectorAll('.shift-btn').forEach(b => b.style.borderColor = '#f3f4f6');
            btn.style.borderColor = '#e11d48';
        }

        // --- DATABASE ACTIONS ---
        function saveAttendance() {
            if(!activeShift || !currentUser) return alert("Shift തിരഞ്ഞെടുക്കുക");
            
            db.ref('users/' + currentUser.uid + '/' + selectedKey).set({
                shift: activeShift,
                ot: document.getElementById('otCheck').checked,
                note: document.getElementById('dayNote').value
            }).then(() => closeModal('dayModal'));
        }

        function deleteEntry() {
            if(confirm("ഡിലീറ്റ് ചെയ്യണോ?") && currentUser) {
                db.ref('users/' + currentUser.uid + '/' + selectedKey).remove()
                .then(() => closeModal('dayModal'));
            }
        }

        function updateStats() {
            const m = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}`;
            let s = { duty: 0, ot: 0, off: 0, hol: 0, lea: 0 };
            Object.keys(attendanceData).forEach(k => {
                if(k.startsWith(m)) {
                    const d = attendanceData[k];
                    if(['A','B','C'].includes(d.shift)) s.duty++;
                    if(d.ot) s.ot++; if(d.shift==='OFF') s.off++; if(d.shift==='HOLIDAY') s.hol++; if(d.shift==='LEAVE') s.lea++;
                }
            });
            document.getElementById('statDuty').innerText=s.duty; document.getElementById('statOt').innerText=s.ot; 
            document.getElementById('statOff').innerText=s.off; document.getElementById('statHoliday').innerText=s.hol; 
            document.getElementById('statLeave').innerText=s.lea;
        }

        // --- TELEGRAM & BACKUP ---
        async function backupToTelegram() {
            if (!currentUser || Object.keys(attendanceData).length === 0) return alert("ഡാറ്റ ലഭ്യമല്ല!");
            
            const fileName = `Apollo_Backup_${currentUser.displayName}_${new Date().toLocaleDateString().replace(/\//g,'-')}.json`;
            const blob = new Blob([JSON.stringify(attendanceData, null, 2)], { type: 'application/json' });
            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('document', blob, fileName);
            formData.append('caption', `Apollo Backup for ${currentUser.displayName}`);

            try {
                const res = await fetch(`https://api.telegram.org/bot${botToken}/sendDocument`, { method: 'POST', body: formData });
                if(res.ok) alert('Backup Sent to Telegram! ✅');
            } catch(e) { alert('Telegram Backup Failed!'); }
        }

        function restoreFromFile(event) {
            const file = event.target.files[0]; if(!file || !currentUser) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if(confirm("ഈ ഫയലിലെ ഡാറ്റ ക്ലൗഡിലേക്ക് സേവ് ചെയ്യട്ടെ?")) {
                        db.ref('users/' + currentUser.uid).set(data).then(() => {
                            alert('Data Restored! ✅');
                            location.reload();
                        });
                    }
                } catch(err) { alert('Invalid Backup File! ❌'); }
            };
            reader.readAsText(file);
        }

        // --- UTILS ---
        function calculateRange() {
            const f = document.getElementById('rangeFrom').value, t = document.getElementById('rangeTo').value;
            if(!f || !t) return alert("Select dates");
            let s = { d:0, o:0, f:0, h:0, l:0 };
            Object.keys(attendanceData).forEach(k => {
                const m = k.substring(0,7);
                if(m >= f && m <= t) {
                    const d = attendanceData[k];
                    if(['A','B','C'].includes(d.shift)) s.d++;
                    if(d.ot) s.o++; if(d.shift==='OFF') s.f++; if(d.shift==='HOLIDAY') s.h++; if(d.shift==='LEAVE') s.l++;
                }
            });
            document.getElementById('rDuty').innerText=s.d; document.getElementById('rOt').innerText=s.o; 
            document.getElementById('rOff').innerText=s.f; document.getElementById('rHoliday').innerText=s.h; 
            document.getElementById('rLeave').innerText=s.l;
            document.getElementById('rangeResults').classList.remove('hidden');
        }

        function changeMonth(d) { currentDate.setMonth(currentDate.getMonth() + d); renderCalendar(); }
        function openSettings() { document.getElementById('settingsModal').classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        
        window.onload = renderCalendar;
    </script>
</body>
</html>
